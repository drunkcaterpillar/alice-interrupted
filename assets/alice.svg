<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 340">
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c87a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e8c87a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- ══ HAIR — one smooth lick streaming upward ══ -->
  <g id="hair" fill="#16100a">
    <path d="M99 48
             C102 40 108 34 116 30
             C126 24 136 18 144 10
             C144 17 141 24 135 31
             C128 39 120 46 114 55
             C108 48 102 47 99 48 Z"/>
    <!-- secondary shorter lick -->
    <path d="M112 44 C120 38 129 34 138 33 C134 39 128 45 120 50 C117 48 114 46 112 44 Z"/>
    <!-- crown fill -->
    <path d="M96 51 C99 43 106 38 113 37 C119 36 124 38 126 41 C121 46 117 51 114 57 L100 56 Z"/>
    <!-- loose wisp on the left -->
    <path d="M94 54 C88 48 86 40 88 31 C92 39 96 46 99 52 Z"/>
  </g>

  <!-- ══ HEAD — profile facing left, chin slightly lifted ══ -->
  <g id="head" fill="#16100a">
    <path d="M100 50
             C94 53 91 59 92 65
             C90 66 89 68 90.5 70.5
             C91.5 71.5 91 72.5 91.5 73.5
             C92 75 93 76.5 94.5 77.5
             C97 80 102 81 106 80
             C112 78 116 72 116 64
             C116 56 110 49 100 50 Z"/>
    <!-- neck -->
    <path d="M101 79 L112 77 L113 91 L101 91 Z"/>
  </g>

  <!-- ══ ARMS + LEGS — stroked centerlines, uniform chunky width ══ -->
  <g fill="none" stroke="#16100a" stroke-linecap="round" stroke-linejoin="round">
    <!-- left arm raised toward the light, held out from the face -->
    <path d="M96 95 C85 88 74 76 67 62 C64 56 61 51 59 47" stroke-width="8.5"/>
    <!-- right arm out-down for balance -->
    <path d="M122 96 C132 102 142 112 150 123 C153 127 156 131 159 134" stroke-width="8.5"/>
    <!-- straight leg -->
    <path d="M100 195 C99 215 98 240 99 262" stroke-width="10.5"/>
    <!-- bent leg: down to knee, calf up-back, heel kicked up -->
    <path d="M112 194 C117 204 122 214 126 222 C131 219 136 211 139 203" stroke-width="10"/>
  </g>
  <!-- hands -->
  <g fill="#16100a">
    <circle cx="58" cy="45" r="4.5"/>
    <circle cx="160" cy="136" r="4.5"/>
  </g>

  <!-- ══ BODICE + puff sleeves ══ -->
  <g id="torso" fill="#16100a">
    <path d="M100 88
             C96 90 93 95 92 102
             L90 124 L128 124 L126 102
             C125 95 122 90 118 88
             C112 86 106 86 100 88 Z"/>
    <ellipse cx="94" cy="97" rx="9" ry="8"/>
    <ellipse cx="124" cy="97" rx="9" ry="8"/>
  </g>

  <!-- ══ SKIRT — bell ballooning in the airstream, wavy hem ══ -->
  <g id="skirt" fill="#16100a">
    <path d="M90 120
             C76 130 64 146 58 166
             C55 176 56 184 60 190
             C66 184 70 188 74 194
             C80 186 84 190 88 198
             C94 190 100 194 104 202
             C110 194 116 198 120 204
             C126 196 132 198 136 192
             C140 186 146 188 150 182
             C152 172 150 160 144 148
             C138 136 132 126 128 120 Z"/>
  </g>

  <!-- ══ SHOES ══ -->
  <g id="shoes" fill="#16100a">
    <!-- straight leg shoe -->
    <path d="M95 259 C91 261 87 265 85 270 C85 274 89 275 95 275 L108 274 C109 269 108 263 107 259 Z"/>
    <!-- raised heel shoe, pointing up-back -->
    <path d="M137 206
             C140 200 142 194 142 188
             C145 185 150 187 150 192
             C148 199 144 205 139 209
             C136 210 135 209 137 206 Z"/>
  </g>

  <!-- ══ GOLD RIM-LIGHT — hairline tracing the lit edges ══ -->
  <g fill="none" stroke="url(#rim)" stroke-width="1.3" stroke-linecap="round" opacity="0.85">
    <path d="M92 65 C90 66 89 68 90.5 70.5"/>
    <path d="M70 68 C67 61 63 53 59 47"/>
    <path d="M58 166 C55 176 56 184 60 190"/>
    <path d="M97 215 C96 230 96 248 97 262"/>
    <path d="M116 30 C126 24 136 18 144 10"/>
  </g>
</svg>
